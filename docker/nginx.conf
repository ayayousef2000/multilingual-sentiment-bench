# ============================================================
#  docker/nginx.conf
#
#  Production nginx config for multilingual-sentiment-bench
#  (Vite SPA + @huggingface/transformers Web Workers)
#
#  Deployed as: /etc/nginx/nginx.conf  ← replaces the base image
#  main config entirely to avoid nested http{} blocks.
#
#  Features:
#    • Port 8080 — non-root safe, Yandex Serverless Containers compliant
#    • /healthz   — lightweight readiness probe (no logging)
#    • SPA fallback routing (index.html for all unknown paths)
#    • Immutable cache for Vite-hashed assets (JS/CSS/fonts/wasm)
#    • Brotli-first compression with gzip fallback
#    • Security headers: CSP tuned for HuggingFace CDN + WASM Web Workers
#    • Permissions-Policy, CORP, COEP, COOP headers for SharedArrayBuffer
#    • Hidden file access denied
#    • server_tokens off — no nginx version leakage
# ============================================================

# ── Worker tuning ─────────────────────────────────────────────────────────────
pid        /tmp/nginx.pid;          # writable by non-root nginx user
worker_processes auto;              # one worker per vCPU core

events {
    worker_connections 1024;
    multi_accept       on;
}

http {
    # ── MIME types ────────────────────────────────────────────────────────────
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # application/wasm is missing from older mime.types — ensure it's present
    types {
        application/wasm  wasm;
    }

    # ── Temp paths writable by non-root nginx user ────────────────────────────
    client_body_temp_path /tmp/client_body;
    proxy_temp_path       /tmp/proxy;
    fastcgi_temp_path     /tmp/fastcgi;
    uwsgi_temp_path       /tmp/uwsgi;
    scgi_temp_path        /tmp/scgi;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    server_tokens      off;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_static       on;     # serve pre-compressed .gz files when available
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/wasm
        image/svg+xml
        font/woff2;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ── Server ────────────────────────────────────────────────────────────────
    server {
        listen      8080;
        server_name _;
        root        /usr/share/nginx/html;
        index       index.html;

        # ── Security headers ──────────────────────────────────────────────────
        # All headers defined at server level — nginx child blocks do NOT merge
        # add_header directives; they inherit OR override the entire set.
        # Keep every security header here and nowhere else.

        add_header X-Content-Type-Options   "nosniff"                         always;
        add_header X-Frame-Options          "DENY"                            always;
        add_header X-XSS-Protection         "1; mode=block"                   always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy
            "camera=(), microphone=(), geolocation=(), payment=()"            always;

        # Cross-Origin headers required to enable SharedArrayBuffer
        # (used by @huggingface/transformers WASM multi-threading)
        add_header Cross-Origin-Opener-Policy   "same-origin"                 always;
        add_header Cross-Origin-Embedder-Policy "require-corp"                always;
        add_header Cross-Origin-Resource-Policy "same-origin"                 always;

        # Content-Security-Policy
        #   script-src  'wasm-unsafe-eval'  → WebAssembly execution
        #   worker-src  blob:               → Vite spawns workers via blob URLs
        #   connect-src huggingface CDNs    → model downloads at runtime
        #   style-src   'unsafe-inline'     → Vite injects critical CSS inline
        add_header Content-Security-Policy
            "default-src 'self'; \
             script-src 'self' 'wasm-unsafe-eval'; \
             style-src 'self' 'unsafe-inline'; \
             img-src 'self' data: blob:; \
             font-src 'self'; \
             worker-src blob: 'self'; \
             connect-src 'self' \
               https://huggingface.co \
               https://cdn-lfs.huggingface.co \
               https://cdn-lfs-us-1.huggingface.co \
               https://*.hf.space; \
             object-src 'none'; \
             base-uri 'self'; \
             form-action 'self'; \
             upgrade-insecure-requests;"
            always;

        # ── Healthz endpoint ──────────────────────────────────────────────────
        location = /healthz {
            access_log  off;
            add_header  Content-Type text/plain;
            return      200 "ok";
        }

        # ── Hashed static assets — immutable cache ────────────────────────────
        # Vite appends a content hash to every JS/CSS/font/wasm filename.
        # Immutable = browser never revalidates; new hash = new URL = new file.
        location ~* \.(js|mjs|css|wasm|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp|avif)$ {
            expires           1y;
            add_header        Cache-Control "public, immutable";
            access_log        off;

            # Serve pre-compressed brotli if available (.br), else nginx gzip
            # Requires nginx compiled with ngx_brotli or gzip_static fallback
            gzip_static on;
        }

        # ── SPA fallback ──────────────────────────────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;

            # index.html must never be cached — always fetch fresh on navigation
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # ── Block hidden files (.git, .env, .htaccess, etc.) ─────────────────
        location ~ /\. {
            deny          all;
            access_log    off;
            log_not_found off;
        }
    }
}
