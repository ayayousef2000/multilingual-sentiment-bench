# ============================================================
#  docker/nginx.conf
#
#  Production nginx config for multilingual-sentiment-bench
#  (Vite SPA + @huggingface/transformers Web Workers)
#
#  Features:
#    • Port 8080 — non-root safe
#    • /healthz   — Yandex Serverless Containers readiness probe
#    • SPA fallback routing (index.html for all unknown paths)
#    • Immutable cache for Vite-hashed assets (JS/CSS/fonts)
#    • gzip + gzip_static (serves pre-compressed .gz if present)
#    • Security headers applied globally via map trick
#    • Content-Security-Policy tuned for HuggingFace CDN + Web Workers
#    • Hidden file access denied
# ============================================================

# ── Worker tuning ─────────────────────────────────────────────────────────────
# auto = one worker per CPU core; ideal for containers with fractional CPUs
worker_processes auto;

events {
    worker_connections 1024;
    multi_accept       on;
}

http {
    # ── MIME types ────────────────────────────────────────────────────────────
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    server_tokens      off;   # hide nginx version from response headers

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_static       on;    # serve pre-compressed .gz files when available
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/wasm
        image/svg+xml
        font/woff2;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    server {
        listen      8080;
        server_name _;
        root        /usr/share/nginx/html;
        index       index.html;

        # ── Security headers ──────────────────────────────────────────────────
        # Defined at server block level so they apply to EVERY response.
        # IMPORTANT: Do NOT repeat add_header inside location blocks —
        # nginx child blocks inherit OR override, never merge.
        # All headers live here only.

        # Prevent MIME-type sniffing
        add_header X-Content-Type-Options   "nosniff"                         always;

        # Prevent clickjacking
        add_header X-Frame-Options          "DENY"                            always;

        # Legacy XSS filter (still respected by some older browsers)
        add_header X-XSS-Protection         "1; mode=block"                   always;

        # Limit referrer information leakage
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

        # Disable unused browser features
        add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

        # Content-Security-Policy
        # Tuned for this app:
        #   • script-src 'self' 'wasm-unsafe-eval'
        #       → allows own scripts + WebAssembly (transformers.js uses WASM)
        #   • worker-src blob: 'self'
        #       → allows Web Workers spawned via blob URLs (Vite worker format: es)
        #   • connect-src 'self' https://huggingface.co https://cdn-lfs.huggingface.co https://*.hf.space
        #       → allows model downloads from HuggingFace CDN at runtime
        #   • style-src 'self' 'unsafe-inline'
        #       → Vite injects critical CSS as inline styles
        #   • img-src 'self' data: blob:
        #       → allows data URIs and blob URLs for any rendered images
        add_header Content-Security-Policy
            "default-src 'self'; \
             script-src 'self' 'wasm-unsafe-eval'; \
             style-src 'self' 'unsafe-inline'; \
             img-src 'self' data: blob:; \
             font-src 'self'; \
             worker-src blob: 'self'; \
             connect-src 'self' https://huggingface.co https://cdn-lfs.huggingface.co https://cdn-lfs-us-1.huggingface.co https://*.hf.space; \
             object-src 'none'; \
             base-uri 'self'; \
             form-action 'self';"
            always;

        # ── Healthz endpoint ──────────────────────────────────────────────────
        # Yandex Serverless Containers readiness probe + Dockerfile HEALTHCHECK.
        # Returns 200 OK with no body — intentionally lightweight.
        location = /healthz {
            access_log  off;
            add_header  Content-Type text/plain;
            return      200 "ok";
        }

        # ── Hashed static assets — cache forever ──────────────────────────────
        # Vite appends a content hash to all JS/CSS/font filenames.
        # Safe to cache indefinitely; a new hash = a new filename = cache bust.
        # .wasm added for @huggingface/transformers WASM binaries.
        location ~* \.(js|css|wasm|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp|avif)$ {
            expires    1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── SPA fallback — route all paths to index.html ──────────────────────
        # React Router handles client-side routing; nginx must not 404 on reload.
        location / {
            try_files $uri $uri/ /index.html;

            # index.html must never be cached — always serve fresh on navigate
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # ── Block hidden files (.git, .env, .htaccess, etc.) ─────────────────
        location ~ /\. {
            deny          all;
            access_log    off;
            log_not_found off;
        }
    }
}
